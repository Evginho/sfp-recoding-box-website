<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="SFP Recoding Box logo">
  <!-- PCB board -->
  <rect x="4" y="4" width="56" height="56" rx="6" ry="6" fill="#1a472a" stroke="#2d6a4f" stroke-width="1.5"/>
  <!-- SFP cage slot -->
  <rect x="10" y="18" width="24" height="14" rx="2" ry="2" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <rect x="12" y="20" width="20" height="10" rx="1" ry="1" fill="#111827"/>
  <!-- RP2040 chip representation -->
  <rect x="38" y="20" width="16" height="16" rx="1" ry="1" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <!-- USB-C at bottom -->
  <rect x="26" y="50" width="12" height="6" rx="2" ry="2" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <!-- LEDs -->
  <circle cx="14" cy="46" r="3" fill="#22c55e"/>
  <circle cx="22" cy="46" r="3" fill="#22c55e" opacity="0.4"/>
  <!-- Traces -->
  <line x1="34" y1="25" x2="38" y2="25" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
  <line x1="34" y1="29" x2="38" y2="29" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
</svg>
